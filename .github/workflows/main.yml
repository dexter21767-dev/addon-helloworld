name: Deploy to Beamup
run-name: Deploy to Beamup by @${{ github.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Error: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.BEAMUP_HOST }}" ]; then
            echo "Error: BEAMUP_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.USERNAME_GITHUB }}" ]; then
            echo "Error: USERNAME_GITHUB secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.PROJECT_NAME }}" ]; then
            echo "Error: PROJECT_NAME secret is not set"
            exit 1
          fi
          echo "All required secrets are configured ✓"
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add the sync-github-keys private key (base32-encoded)
